<!DOCTYPE html>
<html lang="en">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>Document</title>
 <link rel="stylesheet" href="src/output.css">
 <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>
<body>
 
  <!-- top bar -->
   <div class="bg-[#f56c13] py-2 ">
     <div class="container mx-auto px-4">
      <p class="text-white text-center text-[14px] lg:text-[16px] font-semibold">
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Eaque, doloremque.
     </p>
     </div>
   </div>
   
   <!-- mavbar -->
    <div class="bg-white py-3 md:py-5 ">
     <div class="container mx-auto px-4">
      <div class="flex justify-between items-center">
        <button class="block md:hidden" onclick="openSidebar()">
          <i class="fa-solid fa-bars"></i>
        </button>
        <!-- lgog -->
        <div>
         <a href="" class="text-gray-950 font-bold text-[20px] md:text-[30px] lg:text-[35px]">
          Logo
         </a>
        </div>
        <!-- menu -->
        <div class="hidden md:block">
         <ul class="m-0 p-0 flex gap-3">
          <li>
           <a href="" class="text-gray-950 text-base font-semibold hover:text-[#f56c13]">Shop</a>
          </li>
          <li>
           <a href="" class="text-gray-950 text-base font-semibold hover:text-[#f56c13]">Category</a>
          </li>
          <li>
           <a href="" class="text-gray-950 text-base font-semibold hover:text-[#f56c13]">New Arival</a>
          </li>
          <li>
           <a href="" class="text-gray-950 text-base font-semibold hover:text-[#f56c13]">Sale</a>
          </li>
          <li>
           <a href="" class="text-gray-950 text-base font-semibold hover:text-[#f56c13]">About</a>
          </li>
         </ul>
        </div>
        <!-- icons -->
        <div class="">
         <ul class="m-0 p-0 flex gap-3">
          <li>
           <a href="" class="w-[30px] h-[30px] rounded-lg flex justify-center items-center transition hover:bg-blue-100">
            <i class="fa-solid fa-magnifying-glass text-gray-950"></i>
           </a>
          </li>
          <li>
           <a href=""  class="w-[30px] h-[30px] rounded-lg flex justify-center items-center transition hover:bg-blue-100">
            <i class="fa-solid fa-moon text-gray-950"></i>
           </a>
          </li>
          <li class="hidden md:block">
           <a href=""  class="w-[30px] h-[30px] rounded-lg flex justify-center items-center transition hover:bg-blue-100">
            <i class="fa-regular fa-heart text-gray-950"></i>
           </a>
          </li>
          <li>
           <a href=""  class="w-[30px] h-[30px] rounded-lg flex justify-center items-center relative transition hover:bg-blue-100">
            <i class="fa-solid fa-shop text-gray-950"></i>
            <div class="bg-[#f56c13]  rounded-full absolute text-center w-[25px] h-[25px] top-[-10px] right-[-10px] flex justify-center items-center">
             <span class="text-white text-[11px] font-bold">01</span>
            </div>
           </a>
          </li>
         </ul>
        </div>

        <div id="linear" onclick="closeSidebar()" class="absolute top-0 left-[-100%] bg-[rgba(0,0,0,0.9)] w-full h-full"></div>
      </div>
     </div>
    </div>
    <div id="sidebar" class="bg-amber-400    w-[100%]  transition transition-all px-5 py-5" style="display: none;" >
          <div class="flex justify-end">
            <button class="cursor-pointer" onclick="closeSidebar()">
              <i class="fa-solid fa-x"></i>
            </button>
            
          </div>
          <div>
              <ul class="m-0 p-0 flex gap-3 text-center flex-col">
                <li>
                <a href="" class="text-gray-950 text-base font-semibold hover:text-[#f56c13]">Shop</a>
                </li>
                <li>
                <a href="" class="text-gray-950 text-base font-semibold hover:text-[#f56c13]">Category</a>
                </li>
                <li>
                <a href="" class="text-gray-950 text-base font-semibold hover:text-[#f56c13]">New Arival</a>
                </li>
                <li>
                <a href="" class="text-gray-950 text-base font-semibold hover:text-[#f56c13]">Sale</a>
                </li>
                <li>
                <a href="" class="text-gray-950 text-base font-semibold hover:text-[#f56c13]">About</a>
                </li>
              </ul>
            </div>
    </div>

    <section class="">
      <div class="grid grid-cols-1 md:grid-cols-2 ">
        <div>
          data
        </div>
        <div>
          image
        </div>
      </div>
      <h1>Banner section</h1>
    </section>
    
    <script>
      function openSidebar() {
        document.getElementById("sidebar").style.display = "block";     
      }
      function closeSidebar() {
        document.getElementById("sidebar").style.display = "none";
      }
    </script>
</body>
</html>
